<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Dating - Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Button Glow Animation */
        .btn-glow:active {
            transform: scale(0.95);
        }
        
        .primary-glow {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        
        .primary-glow:hover {
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }

        /* Subtle heartbeat for the main button */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        .animate-heartbeat {
            animation: heartbeat 2s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-black text-white overflow-hidden">

    <!-- Background remains exactly as you had it -->
    <div id="landingPage" class="fixed inset-0 z-[500] flex flex-col items-center justify-center bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-800 p-6 text-center">
        
        <!-- Logo Icon -->
        <div class="mb-6 bg-white/10 p-5 rounded-full backdrop-blur-md border border-white/10">
            <svg class="w-16 h-16 text-pink-400 drop-shadow-lg" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
        </div>

        <h1 class="text-4xl font-extrabold mb-2 tracking-tight">Video Dating</h1>
        <p class="text-sm opacity-80 mb-10 max-w-xs leading-relaxed">Meet With New People
         and Make Some Friends❤️ <br>Click On Start Matching!</p>
        
        <!-- Updated Premium Buttons -->
        <div class="flex flex-col gap-4 w-full max-w-xs">
            
            <!-- 1. Start Matching Button (Primary) -->
            <button onclick="window.location.href='dating.html'" 
                class="animate-heartbeat primary-glow bg-white text-indigo-900 font-extrabold py-4 px-10 rounded-2xl transition transform active:scale-95 text-lg flex items-center justify-center gap-2 shadow-2xl">
                <span>Start Matching</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
            </button>
            
            
            <!-- 2. Download App Button -->
            <button onclick="window.location.href='https://github.com/VideoDating/Video-Dating/raw/refs/heads/main/Video%20Dating.apk'" 
                class="mt-6 bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 px-10 rounded-2xl shadow-xl transition transform active:scale-95 text-lg flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14v-4H8l4-4 4 4h-3v4h-2z"/></svg>
                Download App
            </button>

            <!-- 3. Developer Contact Button -->
            <button onclick="window.open('https://instagram.com/1tx_awesh','_blank')" 
                class="flex items-center justify-center gap-2 bg-gradient-to-r from-pink-500 via-red-500 to-yellow-500 text-white font-bold py-4 px-10 rounded-2xl shadow-xl transition transform active:scale-95 text-lg">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849s-.011 3.585-.069 4.85c-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07s-3.584-.012-4.849-.07c-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849s.012-3.584.07-4.849c.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069z"/></svg>
                Developer Contact
            </button>
           
           
            

        </div>
        
        <p class="absolute bottom-6 text-[10px] opacity-40 tracking-widest uppercase">Copyright by AWESH Developer</p>
    </div>

</body>
</html>
